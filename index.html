<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e8b86d">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Habla - Learn Spanish</title>
<link rel="stylesheet" href="css/design-system.css">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/carlos.css">
<link rel="stylesheet" href="css/learn.css">
<link rel="stylesheet" href="css/practice.css">
<link rel="stylesheet" href="css/profile.css">
<link rel="stylesheet" href="css/navigation.css">
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Habla<span>.</span></div>
    <button id="level-btn">Beginner A1</button>
  </header>

  <main id="dashboard"></main>
</div>

<div id="bottom-nav"></div>

<div id="level-overlay">
  <div id="level-sheet">
    <h3>Your Level</h3>
    <p>Carlos adapts to where you are</p>
    <button class="lopt sel" data-level="Beginner A1"><strong>Absolute Beginner</strong><small>A1 - I know zero Spanish</small></button>
    <button class="lopt" data-level="Elementary A2"><strong>Elementary</strong><small>A2 - I know some basics</small></button>
    <button class="lopt" data-level="Intermediate B1"><strong>Intermediate</strong><small>B1 - I can form sentences</small></button>
    <button class="lopt" data-level="Upper-Int B2"><strong>Upper Intermediate</strong><small>B2 - I can hold conversations</small></button>
  </div>
</div>

<script>
  const isLocalHost = location.hostname === "localhost" || location.hostname === "127.0.0.1";

  if ("serviceWorker" in navigator && !isLocalHost) {
    navigator.serviceWorker.register("./service-worker.js");
  }
</script>
<script type="module" src="./js/app.js"></script>
</body>
</html>
